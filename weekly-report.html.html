<script>

   CONFIG 블록 — 추후 연동 시 여기만 수정
   ============================================================ */
const CONFIG = {
  NOTION_TOKEN: "",        // Notion 연동 토큰
  NOTION_DB_ID: "",        // Notion 데이터베이스 ID
  EMAILJS_SERVICE: "",     // EmailJS 서비스 ID
  EMAILJS_TEMPLATE: "",    // EmailJS 템플릿 ID
  EMAILJS_PUBLIC_KEY: "",  // EmailJS 공개키

  MANAGER_PASSWORD: "1234",// 팀장 비밀번호
  TEAM_MEMBERS: ["박세영", "이현주"],  // 팀원 목록
  MANAGER_NAME: "김현세",  // 팀장 이름
  DEPT_NAME: "세컨드라이프 취창업지원팀", // 부서명
  GAS_URL: "https://script.google.com/macros/s/AKfycbxwWombWLEZnMN3OXpWHpkZ5VEWODKvCOQbpU7RkaX6HkcUFNOjAMBG9RrXUVmHXgub/exec"
};

<style>
/* ============================================================
   기본 스타일
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f8f7f4;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1917;
  --text-muted: #6b6a67;
  --text-hint: #9b9a97;
  --accent: #2d6a4f;       /* 초록 계열 — 취창업 상징 */
  --accent-light: #e8f5ee;
  --accent-border: #74c69d;
  --warn: #e76f51;
  --warn-light: #fdf0ec;
  --radius: 10px;
  --radius-lg: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ============================================================
   레이아웃
   ============================================================ */
.app { display: flex; flex-direction: column; min-height: 100vh; }

.header {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border-strong);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  display: flex;
  flex-direction: column;
}

.header-logo .dept { font-size: 11px; color: var(--text-hint); letter-spacing: 0.02em; }
.header-logo .title { font-size: 15px; font-weight: 600; color: var(--text); }

.header-nav button {
  background: none;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.15s;
}
.header-nav button:hover { background: var(--surface2); }
.header-nav button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.main { padding: 24px 20px; max-width: 680px; margin: 0 auto; width: 100%; flex: 1; }

/* ============================================================
   화면 전환
   ============================================================ */
.screen { display: none; }
.screen.active { display: block; }

/* ============================================================
   섹션 카드
   ============================================================ */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}

.card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-hint);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ============================================================
   폼 요소
   ============================================================ */
select, textarea, input[type="text"], input[type="password"] {
  width: 100%;
  background: var(--surface2);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 13px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  line-height: 1.5;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}

select:focus, textarea:focus, input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

.optional-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.optional-row label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
.optional-toggle {
  appearance: none;
  width: 36px;
  height: 20px;
  background: var(--border-strong);
  border-radius: 20px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
  border: none;
}
.optional-toggle:checked { background: var(--accent); }
.optional-toggle::after {
  content: "";
  position: absolute;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
}
.optional-toggle:checked::after { transform: translateX(16px); }

/* ============================================================
   버튼
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px 22px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  transition: background 0.15s, transform 0.1s;
  width: 100%;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #245c43; }

.btn-warn {
  background: var(--warn);
  border-color: var(--warn);
  color: #fff;
}
.btn-warn:hover { background: #c9603f; }

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

/* ============================================================
   날짜 / 주차 표시

.week-chip {

  font-size: 12px;

.week-date { font-size: 13px; color: var(--text-muted); }

/* ============================================================
   제출 완료 화면
   ============================================================ */
.success-box {
  text-align: center;
  padding: 40px 20px;
}
.success-icon { font-size: 48px; margin-bottom: 12px; }

/* ============================================================

/* ============================================================
   보고서 열람
   ============================================================ */
.report-view { margin-top: 12px; }
.report-section { margin-bottom: 14px; }
.report-section-label {

/* ============================================================
   비밀번호 화면
   ============================================================ */
.login-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;

.login-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }

/* ============================================================

.tab-row {

}

/* ============================================================
   반응형
   ============================================================ */
@media (max-width: 480px) {
  .main { padding: 16px 14px; }

}

/* 확인 완료 표시 */
.checked-badge {
  font-size: 11px;

<body>
<div class="app">

  <!-- ===================================================
       헤더
       =================================================== -->
  <header class="header">
    <div class="header-logo">

    </div>

        <!-- 주차 선택 (과거 열람) -->
        <div style="margin-top:14px;">
          <div class="week-selector">
            <label>주차 선택</label>
            <select id="memberWeekSelect" onchange="onMemberWeekChange()"></select>
          </div>
          <div id="memberPastBanner" class="past-banner" style="display:none;">📂 과거 보고서 열람 중 — 수정 불가</div>
        </div>
      </div>

      <!-- 완료 업무 -->
      <div class="card">
        <div class="card-label">✅ 완료 업무</div>
        <textarea id="fieldDone" placeholder="이번 주 완료한 업무를 입력하세요"></textarea>
      </div>

      <!-- 진행 중 업무 -->
      <div class="card">
        <div class="card-label">🔄 진행 중 업무</div>
        <textarea id="fieldInProgress" placeholder="현재 진행 중인 업무를 입력하세요"></textarea>
      </div>

      <!-- 취업 성과 -->
      <div class="card">
        <div class="card-label">🏆 취업 성과</div>
        <textarea id="fieldResult" placeholder="취업/창업 연결 성과, 상담 결과 등"></textarea>
      </div>

      <!-- 다음 주 계획 -->
      <div class="card">
        <div class="card-label">📋 다음 주 계획</div>
        <textarea id="fieldPlan" placeholder="다음 주에 진행할 업무 계획"></textarea>

      <!-- 이슈 (선택) -->
      <div class="card">
        <div class="optional-row">
          <input type="checkbox" class="optional-toggle" id="issueToggle" onchange="toggleIssue()">
          <label for="issueToggle">⚠️ 이슈 있음 (선택)</label>
        </div>
        <div id="issueField" style="display:none;">
          <textarea id="fieldIssue" placeholder="이슈 내용을 입력하세요"></textarea>
        </div>
      </div>

      <!-- 버튼 -->
      <div class="btn-row">
        <button class="btn btn-primary" id="submitBtn" onclick="submitReport()">보고서 제출</button>
        <button class="btn" id="editBtn" style="display:none;" onclick="editReport()">수정하기</button>
      </div>

      <!-- 제출 완료 표시 -->
      <div id="submitSuccess" style="display:none;" class="card" style="margin-top:16px;">

          <div id="pwError" style="color:#e76f51;font-size:13px;text-align:center;display:none;">비밀번호가 올바르지 않습니다</div>

    <!-- ===================================================
         팀장 화면 — 대시보드
         =================================================== -->

      <!-- 주차 정보 -->
      <div class="card">
        <div class="card-label">주차 선택</div>
        <div class="week-selector">
          <select id="managerWeekSelect" onchange="onManagerWeekChange()"></select>
        </div>
        <div class="week-badge" style="margin-top:8px;">
          <span class="week-chip" id="managerWeekChip">--주차</span>
          <span class="week-date" id="managerWeekDate"></span>
        </div>
      </div>

      <div class="member-status-grid" id="memberStatusGrid">

        <!-- JS로 생성 -->

<script>
/* ============================================================
   초기화
   ============================================================ */
let managerLoggedIn = false;
let currentMemberReport = null; // 현재 열람 중인 팀원
let selectedManagerWeekKey = null; // 팀장 선택 주차
let selectedMemberWeekKey = null;  // 팀원 선택 주차

// 부서명 설정
document.getElementById('deptName').textContent = CONFIG.DEPT_NAME;

// 드롭다운 팀원 목록 생성
const sel = document.getElementById('memberName');
CONFIG.TEAM_MEMBERS.forEach(name => {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  sel.appendChild(opt);
});

/* ============================================================
   날짜 / 주차 계산
   ============================================================ */
function getWeekInfo() {
  const now = new Date();
  const year = now.getFullYear();
  // 해당 년도 첫 날 기준 몇 번째 주인지
  const start = new Date(year, 0, 1);
  const diff = now - start;
  const week = Math.ceil((diff / (1000 * 60 * 60 * 24) + start.getDay() + 1) / 7);

  const month = now.getMonth() + 1;
  const day = now.getDate();
  const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
  const dayStr = dayNames[now.getDay()];

  return {
    label: `${year}년 ${week}주차`,
    date: `${month}월 ${day}일 (${dayStr})`,
    key: `${year}-W${String(week).padStart(2,'0')}` // 저장 키용
  };
}

/* ============================================================
   최근 4주 주차 목록 생성
   ============================================================ */
function getLast4Weeks() {
  const weeks = [];
  const now = new Date();
  for (let i = 0; i < 4; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i * 7);
    const year = d.getFullYear();
    const start = new Date(year, 0, 1);
    const diff = d - start;
    const week = Math.ceil((diff / (1000 * 60 * 60 * 24) + start.getDay() + 1) / 7);
    const key = `${year}-W${String(week).padStart(2,'0')}`;
    const label = i === 0 ? `${year}년 ${week}주차 (이번 주)` : `${year}년 ${week}주차`;
    weeks.push({ key, label, week, year });
  }
  return weeks;
}

function populateWeekSelects() {
  const weeks = getLast4Weeks();
  ['memberWeekSelect', 'managerWeekSelect'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    weeks.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.key;
      opt.textContent = w.label;
      sel.appendChild(opt);
    });
  });
  // 기본값: 이번 주
  selectedManagerWeekKey = weeks[0].key;
  selectedMemberWeekKey = weeks[0].key;
}

populateWeekSelects();

const weekInfo = getWeekInfo();
document.getElementById('weekChip').textContent = weekInfo.label;
document.getElementById('weekDate').textContent = weekInfo.date;
document.getElementById('managerWeekChip').textContent = weekInfo.label;
document.getElementById('managerWeekDate').textContent = weekInfo.date;

/* ============================================================
   로컬스토리지 헬퍼
   ============================================================ */
function storageKey(memberName, weekKey) {
  const wk = weekKey || weekInfo.key;
  return `report_${wk}_${memberName}`;
}

function saveReport(memberName, data, weekKey) {
  localStorage.setItem(storageKey(memberName, weekKey), JSON.stringify(data));
}

function loadReport(memberName, weekKey) {
  const raw = localStorage.getItem(storageKey(memberName, weekKey));
  return raw ? JSON.parse(raw) : null;
}

/* ============================================================
   주차 선택 변경 핸들러
   ============================================================ */
function onManagerWeekChange() {
  const weeks = getLast4Weeks();
  const key = document.getElementById('managerWeekSelect').value;
  selectedManagerWeekKey = key;
  const w = weeks.find(x => x.key === key);
  if (w) {
    document.getElementById('managerWeekChip').textContent = `${w.year}년 ${w.week}주차`;
  }
  renderManagerDashboard();
}

function onMemberWeekChange() {
  const weeks = getLast4Weeks();
  const key = document.getElementById('memberWeekSelect').value;
  selectedMemberWeekKey = key;
  const isPast = key !== weeks[0].key;
  document.getElementById('memberPastBanner').style.display = isPast ? '' : 'none';

  const w = weeks.find(x => x.key === key);
  if (w) {
    document.getElementById('weekChip').textContent = `${w.year}년 ${w.week}주차`;
  }

  const name = document.getElementById('memberName').value;
  if (name) loadMemberData(name, key, isPast);
}

/* ============================================================
   팀원 화면 — 이름 선택 시 기존 데이터 불러오기
   ============================================================ */
function onMemberChange() {
  const name = document.getElementById('memberName').value;
  if (!name) return;
  const weeks = getLast4Weeks();
  const isPast = selectedMemberWeekKey !== weeks[0].key;
  loadMemberData(name, selectedMemberWeekKey, isPast);
}

function loadMemberData(name, weekKey, isPast) {
  const existing = loadReport(name, weekKey);
  if (existing) {
    document.getElementById('fieldDone').value = existing.done || '';
    document.getElementById('fieldInProgress').value = existing.inProgress || '';
    document.getElementById('fieldResult').value = existing.result || '';
    document.getElementById('fieldPlan').value = existing.plan || '';
    document.getElementById('fieldIssue').value = existing.issue || '';

    if (existing.issue) {
      document.getElementById('issueToggle').checked = true;
      document.getElementById('issueField').style.display = 'block';
    } else {
      document.getElementById('issueToggle').checked = false;
      document.getElementById('issueField').style.display = 'none';
    }

    if (isPast) {
      // 과거 주차 — 읽기 전용
      setFieldsReadonly(true);
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('submitSuccess').style.display = 'none';
    } else if (existing.submitted) {
      showSubmittedState(name, existing.submittedAt);
    } else {
      showEditState();
    }
  } else {
    clearFields();
    if (isPast) {
      setFieldsReadonly(true);
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('editBtn').style.display = 'none';
    } else {
      showEditState();
    }
  }
}

function clearFields() {
  ['fieldDone','fieldInProgress','fieldResult','fieldPlan','fieldIssue'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('issueToggle').checked = false;
  document.getElementById('issueField').style.display = 'none';
  document.getElementById('submitSuccess').style.display = 'none';
}

function showSubmittedState(name, submittedAt) {
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('editBtn').style.display = '';
  document.getElementById('submitSuccess').style.display = '';
  document.getElementById('successSub').textContent =
    `${name} · ${submittedAt || ''}`;
  // 입력 필드 비활성화
  setFieldsReadonly(true);
}

function showEditState() {
  document.getElementById('submitBtn').style.display = '';
  document.getElementById('editBtn').style.display = 'none';
  document.getElementById('submitSuccess').style.display = 'none';
  setFieldsReadonly(false);
}

function setFieldsReadonly(readonly) {
  ['fieldDone','fieldInProgress','fieldResult','fieldPlan','fieldIssue'].forEach(id => {
    document.getElementById(id).readOnly = readonly;
  });
  document.getElementById('memberName').disabled = readonly;
}

/* ============================================================
   이슈 토글
   ============================================================ */
function toggleIssue() {
  const on = document.getElementById('issueToggle').checked;
  document.getElementById('issueField').style.display = on ? 'block' : 'none';
}

/* ============================================================
   보고서 제출
   ============================================================ */
function submitReport() {
  const name = document.getElementById('memberName').value;
  if (!name) { alert('이름을 선택해주세요'); return; }

  const done = document.getElementById('fieldDone').value.trim();
  const inProgress = document.getElementById('fieldInProgress').value.trim();
  const result = document.getElementById('fieldResult').value.trim();
  const plan = document.getElementById('fieldPlan').value.trim();

  if (!done && !inProgress && !plan) {
    alert('최소한 하나의 항목을 입력해주세요');
    return;
  }

  const hasIssue = document.getElementById('issueToggle').checked;
  const issue = hasIssue ? document.getElementById('fieldIssue').value.trim() : '';

  const now = new Date();
  const submittedAt = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const data = {
    name, done, inProgress, result, plan, issue,
    submitted: true,
    submittedAt,
    checkedByManager: false
  };

 saveReport(name, data, selectedMemberWeekKey);

  // Google Sheets 저장
  if (CONFIG.GAS_URL) {
    fetch(CONFIG.GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'submit', week: selectedMemberWeekKey, name, done, inProgress, result, plan, issue })
    }).catch(e => console.warn('GAS 저장 실패:', e));
  }

  showSubmittedState(name, submittedAt);
}

/* ============================================================
   수정하기
   ============================================================ */
function editReport() {
  const name = document.getElementById('memberName').value;
  const data = loadReport(name, selectedMemberWeekKey);
  if (data) {
    data.submitted = false;
   saveReport(name, data, selectedMemberWeekKey);
  }
  showEditState();
  document.getElementById('memberName').disabled = false;
}

/* ============================================================
   화면 전환 (팀원 ↔ 팀장)
   ============================================================ */
function switchMode(mode) {
  document.getElementById('navMember').classList.toggle('active', mode === 'member');
  document.getElementById('navManager').classList.toggle('active', mode === 'manager');

  document.getElementById('screenMember').classList.toggle('active', mode === 'member');

  if (mode === 'manager') {
    if (managerLoggedIn) {
      document.getElementById('screenLogin').classList.remove('active');
      document.getElementById('screenManager').classList.add('active');
      renderManagerDashboard();
    } else {
      document.getElementById('screenLogin').classList.add('active');
      document.getElementById('screenManager').classList.remove('active');
    }
  } else {
    document.getElementById('screenLogin').classList.remove('active');
    document.getElementById('screenManager').classList.remove('active');
  }
}

/* ============================================================
   팀장 로그인
   ============================================================ */
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === CONFIG.MANAGER_PASSWORD) {
    managerLoggedIn = true;
    document.getElementById('pwError').style.display = 'none';
    document.getElementById('pwInput').value = '';
    document.getElementById('screenLogin').classList.remove('active');
    document.getElementById('screenManager').classList.add('active');
    renderManagerDashboard();
  } else {
    document.getElementById('pwError').style.display = 'block';
  }
}

function managerLogout() {
  managerLoggedIn = false;
  switchMode('member');
}

/* ============================================================
   팀장 대시보드 렌더링
   ============================================================ */
function renderManagerDashboard() {
  const grid = document.getElementById('memberStatusGrid');
  const tabs = document.getElementById('reportTabs');
  grid.innerHTML = '';
  tabs.innerHTML = '';

  CONFIG.TEAM_MEMBERS.forEach((name, i) => {
    const data = loadReport(name, selectedManagerWeekKey);
    const submitted = data && data.submitted;
    const checked = data && data.checkedByManager;

    // 현황 카드
    const card = document.createElement('div');
    card.className = 'member-card' + (submitted ? ' submitted' : '') + (checked ? ' checked' : '');
    card.innerHTML = `
      <div class="member-name">${name}</div>
      <span class="member-badge">${submitted ? (checked ? '확인 완료' : '제출 완료') : '미제출'}</span>
      <div class="member-time">${submitted ? data.submittedAt : ''}</div>
    `;
    grid.appendChild(card);

    // 탭
    const tab = document.createElement('button');
    tab.className = 'tab-btn' + (i === 0 ? ' active' : '');
    tab.textContent = name;
    tab.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      renderReportContent(name);
    };
    tabs.appendChild(tab);
  });

  // 첫 번째 팀원 보고서 자동 표시
  renderReportContent(CONFIG.TEAM_MEMBERS[0]);
}

/* ============================================================
   보고서 내용 열람
   ============================================================ */
function renderReportContent(memberName) {
  currentMemberReport = memberName;
  const container = document.getElementById('reportContent');
  const data = loadReport(memberName, selectedManagerWeekKey);

  if (!data || !data.submitted) {
    container.innerHTML = `<div class="empty-report">${memberName}님의 보고서가 아직 제출되지 않았습니다</div>`;
    return;
  }

  const sections = [
    { label: '✅ 완료 업무', value: data.done },
    { label: '🔄 진행 중 업무', value: data.inProgress },
    { label: '🏆 취업 성과', value: data.result },
    { label: '📋 다음 주 계획', value: data.plan },
  ];
  if (data.issue) sections.push({ label: '⚠️ 이슈', value: data.issue });

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div>
        <div style="font-size:15px;font-weight:600;">${memberName}</div>
        <div style="font-size:12px;color:var(--text-hint);">제출 ${data.submittedAt}</div>
      </div>
      ${data.checkedByManager
        ? `<div class="checked-badge">✓ 확인 완료</div>`
        : `<button class="btn btn-primary" style="width:auto;padding:7px 16px;font-size:13px;" onclick="markChecked('${memberName}')">확인 완료</button>`
      }
    </div>
    <hr class="report-divider">
  `;

  sections.forEach(s => {
    html += `
      <div class="report-section">
        <div class="report-section-label">${s.label}</div>
        <div class="report-section-content">${s.value || '—'}</div>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* ============================================================
   팀장 확인 완료
   ============================================================ */
function markChecked(memberName) {
  const data = loadReport(memberName, selectedManagerWeekKey);
  if (!data) return;
  data.checkedByManager = true;
  saveReport(memberName, data, selectedManagerWeekKey);

  // Google Sheets 동기화
  if (CONFIG.GAS_URL) {
    fetch(CONFIG.GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'markChecked', week: selectedManagerWeekKey, name: memberName, password: CONFIG.MANAGER_PASSWORD })
    }).catch(e => console.warn('GAS 확인 실패:', e));
  }

  renderManagerDashboard();
  // 탭 활성 상태 유지
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent === memberName) b.classList.add('active');
    else b.classList.remove('active');
  });
  renderReportContent(memberName);
}
</script>

</html>
